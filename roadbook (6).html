<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadBook — GPX Tulip Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap');
  :root { --ink:#1a1a18; --paper:#f5f0e8; --accent:#c8352a; --muted:#7a7568; --border:#ccc5b0; --card:#faf7f2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Barlow',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,0.04) 28px),
      repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(0,0,0,0.02) 28px); }
  header { background:var(--ink); color:var(--paper); padding:16px 32px; display:flex; align-items:baseline; gap:16px; border-bottom:4px solid var(--accent); }
  header h1 { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }
  header span { font-size:13px; color:#a09880; letter-spacing:0.1em; text-transform:uppercase; }
  .app-container { max-width:960px; margin:0 auto; padding:24px 16px; }
  .drop-zone { border:2px dashed var(--border); border-radius:4px; padding:48px 32px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--card); position:relative; }
  .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:#fff8f0; }
  .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .drop-icon { font-size:48px; margin-bottom:12px; display:block; color:var(--accent); }
  .drop-zone h2 { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink); margin-bottom:6px; }
  .drop-zone p { font-size:14px; color:var(--muted); }
  .controls { display:none; background:var(--card); border:1px solid var(--border); border-radius:4px; padding:20px 24px; margin-top:16px; gap:0; flex-direction:column; }
  .controls.visible { display:flex; }
  .controls-row { display:flex; flex-wrap:wrap; gap:24px; align-items:center; }
  .controls-row+.controls-row { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .controls-section-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent); margin-bottom:10px; }
  .control-group { display:flex; align-items:center; gap:10px; }
  .control-group label { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); white-space:nowrap; }
  .control-group input[type=range] { width:120px; accent-color:var(--accent); }
  .control-group .val { font-size:13px; font-weight:500; min-width:36px; color:var(--ink); }
  .btn { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; padding:10px 22px; border:none; border-radius:2px; cursor:pointer; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#a82a20; }
  .btn-secondary { background:transparent; color:var(--ink); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--ink); }
  select { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; padding:6px 10px; border:1px solid var(--border); border-radius:2px; background:var(--paper); color:var(--ink); cursor:pointer; }
  .interp-badge { font-size:11px; color:var(--muted); font-style:italic; }
  .file-info { display:none; font-size:13px; color:var(--muted); margin-top:8px; padding-left:4px; }
  .file-info.visible { display:block; }
  .file-info strong { color:var(--ink); }
  .roadbook-section { display:none; margin-top:32px; }
  .roadbook-section.visible { display:block; }
  .rb-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
  .rb-header h2 { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
  .rb-stats { font-size:13px; color:var(--muted); display:flex; gap:20px; }
  .rb-stats span strong { color:var(--ink); }
  .rb-table { width:100%; border-collapse:collapse; background:var(--card); border:2px solid var(--ink); border-radius:2px; overflow:hidden; table-layout:fixed; }
  .rb-table thead { background:var(--ink); color:var(--paper); }
  .rb-table thead th { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; padding:8px 12px; text-align:center; border-right:1px solid rgba(255,255,255,0.15); }
  .rb-table thead th:last-child { border-right:none; }
  .rb-table col.col-dist { width:22%; }
  .rb-table col.col-tulip { width:44%; }
  .rb-table col.col-notes { width:34%; }
  .rb-table tbody tr { border-bottom:2px solid var(--ink); }
  .rb-table tbody tr:last-child { border-bottom:none; }
  .rb-table tbody tr:nth-child(even) { background:#f0ebe0; }
  td.col-dist { border-right:2px solid var(--ink); padding:0; position:relative; }
  .dist-total-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px 8px 32px 8px; min-height:90px; }
  .dist-total { font-family:'Barlow Condensed',sans-serif; font-size:38px; font-weight:700; color:var(--ink); line-height:1; }
  .dist-total-unit { font-family:'Barlow Condensed',sans-serif; font-size:14px; color:var(--muted); margin-top:2px; }
  .dist-delta-box { position:absolute; bottom:0; left:0; border-top:1.5px solid var(--ink); border-right:1.5px solid var(--ink); border-left:1.5px solid var(--ink); padding:5px 10px; line-height:1.2; }
  .dist-delta { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; color:var(--ink); white-space:nowrap; display:block; }
  td.col-tulip { vertical-align:top; text-align:center; border-right:2px solid var(--ink); padding:6px; position:relative; }
  /* symbol strip — top-right of tulip cell */
  .sym-strip { position:absolute; top:4px; right:4px; display:flex; flex-wrap:wrap; gap:2px; justify-content:flex-end; max-width:80px; z-index:1; }
  .sym-strip img { width:30px; height:30px; cursor:pointer; display:block; }
  /* signal picker — inline below the ⊕ button, inside the notes cell */
  td.col-notes { vertical-align:top; padding:10px 12px; font-size:13px; color:var(--muted); }
  .turn-name { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; color:var(--ink); font-style:normal; text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:2px; }
  .turn-deg { font-size:12px; color:var(--accent); font-family:'Barlow Condensed',sans-serif; display:block; margin-bottom:6px; }
  .notes-input { width:100%; border:none; border-bottom:1px dashed var(--border); background:transparent; font-size:12px; font-family:'Barlow',sans-serif; color:var(--ink); padding:2px 0; outline:none; font-style:italic; }
  .notes-input::placeholder { color:var(--border); }
  /* the ⊕ trigger */
  .spk-trigger { margin-top:6px; background:none; border:1px dashed var(--accent); border-radius:3px; font-size:11px; color:var(--accent); cursor:pointer; padding:2px 6px; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em; }
  .spk-trigger:hover { background:var(--accent); color:white; }
  /* inline picker panel */
  .spk-panel { display:none; margin-top:6px; padding:6px; background:var(--paper); border:1.5px solid var(--accent); border-radius:3px; flex-wrap:wrap; gap:4px; }
  .spk-panel.open { display:flex; }
  .spk-btn { background:none; border:1px solid transparent; border-radius:3px; padding:3px; cursor:pointer; }
  .spk-btn:hover { background:#f0ebe0; border-color:var(--border); }
  /* SURFACE SYMBOL — bottom-right of tulip cell */
  .surf-strip { position:absolute; bottom:4px; right:4px; display:flex; align-items:center; justify-content:center; gap:2px; }
  .surf-strip svg { display:block; }
  @media print { .surf-strip svg { print-color-adjust:exact; -webkit-print-color-adjust:exact; } }
  @media print {
    * { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
    body { background:white !important; background-image:none !important; margin:0; }
    header { display:none !important; }
    .drop-zone,.controls,.file-info,.rb-header { display:none !important; }
    .roadbook-section { display:block !important; margin:0; }
    .app-container { padding:0; max-width:100%; margin:0; }
    .rb-table { border:2px solid #1a1a18 !important; width:100%; }
    .rb-table tbody tr:nth-child(even) { background:#f0ebe0 !important; }
    .dist-delta-box { background:white !important; }
    .rb-table tbody tr:nth-child(even) .dist-delta-box { background:#f0ebe0 !important; }
    .spk-trigger,.spk-panel { display:none !important; }
    svg { overflow:visible; }
    tr { page-break-inside:avoid; }
  }
</style>
</head>
<body>
<header><h1>RoadBook</h1><span>GPX Tulip Generator</span></header>
<div class="app-container">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".gpx">
    <span class="drop-icon">⛰</span>
    <h2>Drop your GPX file here</h2>
    <p>or click to browse — supports standard GPX 1.1 track files</p>
  </div>
  <div class="file-info" id="fileInfo"></div>
  <div class="controls" id="controls">
    <div class="controls-section-label">Interpolation</div>
    <div class="controls-row">
      <div class="control-group">
        <label>Method</label>
        <select id="interpMethod">
          <option value="none">None (raw GPX)</option>
          <option value="linear" selected>Linear</option>
          <option value="spline">Spline (Catmull-Rom)</option>
        </select>
      </div>
      <div class="control-group" id="spacingGroup">
        <label>Spacing</label>
        <input type="range" id="spacingSlider" min="5" max="50" value="10" step="5">
        <span class="val" id="spacingVal">10 m</span>
      </div>
      <span class="interp-badge" id="interpBadge"></span>
    </div>
    <div class="controls-row">
      <div class="controls-section-label" style="margin-bottom:0;margin-right:8px">Turn detection</div>
      <div class="control-group">
        <label>Min angle</label>
        <input type="range" id="angleSlider" min="10" max="90" value="30" step="5">
        <span class="val" id="angleVal">30°</span>
      </div>
      <div class="control-group">
        <label>Min dist</label>
        <input type="range" id="distSlider" min="20" max="500" value="100" step="10">
        <span class="val" id="distVal">100 m</span>
      </div>
      <button class="btn btn-primary" id="generateBtn">Generate roadbook</button>
      <button class="btn btn-secondary" id="surfaceBtn" style="display:none">Fetch surfaces</button>
      <button class="btn btn-secondary" id="elevationBtn" style="display:none">Fetch elevation</button>
      <button class="btn btn-secondary" id="printBtn">Print / PDF</button>
    </div>
  </div>
  <div class="roadbook-section" id="roadbookSection">
    <div class="rb-header">
      <h2>Roadbook</h2>
      <div class="rb-stats" id="rbStats"></div>
    </div>
    <table class="rb-table">
      <colgroup><col class="col-dist"><col class="col-tulip"><col class="col-notes"></colgroup>
      <thead><tr><th>KM / Delta</th><th>Junction</th><th>Notes &amp; Cautions</th></tr></thead>
      <tbody id="rbBody"></tbody>
    </table>
  </div>
</div>
<script>

// ─── GPX Parser ───────────────────────────────────────────────────────────────
function parseGPX(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'application/xml');
  const points = [];
  doc.querySelectorAll('trkpt').forEach(pt => {
    const lat = parseFloat(pt.getAttribute('lat'));
    const lon = parseFloat(pt.getAttribute('lon'));
    const eleEl = pt.querySelector('ele');
    const ele = eleEl ? parseFloat(eleEl.textContent) : 0;
    if (!isNaN(lat) && !isNaN(lon)) points.push({ lat, lon, ele });
  });
  return points;
}

// ─── Geo Math

// ─── Geo Math ─────────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371000;
  const p1 = a.lat*Math.PI/180, p2 = b.lat*Math.PI/180;
  const dp = (b.lat-a.lat)*Math.PI/180, dl = (b.lon-a.lon)*Math.PI/180;
  const s = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return 2*R*Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
function bearing(a, b) {
  const p1=a.lat*Math.PI/180, p2=b.lat*Math.PI/180, dl=(b.lon-a.lon)*Math.PI/180;
  const y=Math.sin(dl)*Math.cos(p2), x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function angleDiff(a, b) {
  let d=b-a; while(d>180) d-=360; while(d<-180) d+=360; return d;
}

// ─── Turn Detection

// ─── Turn Detection ───────────────────────────────────────────────────────────
function detectTurns(points, minAngle, minDist) {
  const WINDOW=5, turns=[];
  let lastTurnDist=0;
  const cumDist=[0];
  for (let i=1; i<points.length; i++) cumDist.push(cumDist[i-1]+haversine(points[i-1],points[i]));
  const totalDist=cumDist[cumDist.length-1];
  function avgBearing(idx, forward) {
    const bs=[];
    if (forward) { for (let j=idx; j<Math.min(idx+WINDOW,points.length-1); j++) bs.push(bearing(points[j],points[j+1])); }
    else { for (let j=Math.max(0,idx-WINDOW); j<idx; j++) bs.push(bearing(points[j],points[j+1])); }
    if (!bs.length) return null;
    let sc=0, ss=0;
    bs.forEach(b => { sc+=Math.cos(b*Math.PI/180); ss+=Math.sin(b*Math.PI/180); });
    return (Math.atan2(ss/bs.length,sc/bs.length)*180/Math.PI+360)%360;
  }
  for (let i=WINDOW; i<points.length-WINDOW; i++) {
    const distFromLast=cumDist[i]-lastTurnDist;
    if (distFromLast<minDist) continue;
    const bIn=avgBearing(i,false), bOut=avgBearing(i,true);
    if (bIn===null||bOut===null) continue;
    const angle=angleDiff(bIn,bOut);
    if (Math.abs(angle)>=minAngle) {
      turns.push({index:i, distFromStart:cumDist[i], distFromLast, bearingIn:bIn, bearingOut:bOut, angle, junctionHint:'normal'});
      lastTurnDist=cumDist[i];
    }
  }
  for (let i=0; i<turns.length-1; i++) turns[i].distToNext=turns[i+1].distFromStart-turns[i].distFromStart;
  if (turns.length>0) turns[turns.length-1].distToNext=totalDist-turns[turns.length-1].distFromStart;
  return {turns, totalDist};
}

// ─── Turn Classification

// ─── Turn Classification ──────────────────────────────────────────────────────
function classifyTurn(angle) {
  const a=Math.abs(angle), dir=angle>0?'right':'left';
  if (a<20) return {label:'Slight '+dir};
  if (a<50) return {label:dir==='right'?'Keep right':'Keep left'};
  if (a<80) return {label:'Turn '+dir};
  if (a<110) return {label:'Sharp '+dir};
  return {label:'U-turn '+dir};
}

// ─── Junction Classifier

// ─── Junction Classifier ──────────────────────────────────────────────────────
function classifyJunction(angle, normOut) {
  const abs=Math.abs(angle);
  if (abs>=155) return {type:'hairpin', arms:[180,normOut]};
  if (abs>=70&&abs<=115) return {type:'T', arms:[180,normOut]};
  if (abs>=40&&abs<70) return {type:'cross', arms:[0,180,normOut,(normOut+180)%360]};
  if (abs>=20&&abs<40) return {type:'Y', arms:[0,180,normOut]};
  return {type:'bend', arms:[180,normOut]};
}

// ─── Tulip SVG

// ─── Tulip SVG — Dakar style ──────────────────────────────────────────────────
function drawTulip(bearingIn, bearingOut, angle, junctionHint) {
  const S=120, cx=S/2, cy=S/2;
  const roadLen=44, roadW=10, routeW=8, arrowSz=14, symR=16;
  const ink='#1a1a18', grey='#888880', red='#c8352a';
  const normOut=(180-bearingOut+bearingIn+360)%360;
  const isRoundabout=junctionHint==='roundabout';
  const {type,arms}=classifyJunction(angle,normOut);
  function toXY(deg,len) {
    const rad=(deg-90)*Math.PI/180;
    return [+(cx+len*Math.cos(rad)).toFixed(2), +(cy+len*Math.sin(rad)).toFixed(2)];
  }
  function arrowPoly(deg,tipX,tipY) {
    const rad=(deg-90)*Math.PI/180, hw=11;
    const wx=Math.cos(rad+Math.PI/2)*hw, wy=Math.sin(rad+Math.PI/2)*hw;
    const bx=tipX-arrowSz*Math.cos(rad), by=tipY-arrowSz*Math.sin(rad);
    return (bx+wx).toFixed(1)+','+(by+wy).toFixed(1)+' '+tipX.toFixed(1)+','+tipY.toFixed(1)+' '+(bx-wx).toFixed(1)+','+(by-wy).toFixed(1);
  }
  const [ex0,ey0]=toXY(180,roadLen);
  const [ox1,oy1]=toXY(normOut,roadLen);
  const [oxs,oys]=toXY(normOut,roadLen-arrowSz);
  let s='';
  if (isRoundabout) {
    const rr=14;
    [0,90,180,270].forEach(a => { const [ax,ay]=toXY(a,roadLen),[ex,ey]=toXY(a,rr); s+='<line x1="'+ex+'" y1="'+ey+'" x2="'+ax+'" y2="'+ay+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>'; });
    const [re,re2]=toXY(180,rr),[rx2,ry2]=toXY(normOut,rr);
    s+='<line x1="'+ex0+'" y1="'+ey0+'" x2="'+re+'" y2="'+re2+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>';
    s+='<line x1="'+ex0+'" y1="'+ey0+'" x2="'+re+'" y2="'+re2+'" stroke="'+red+'" stroke-width="'+routeW+'" stroke-linecap="round"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rr+'" fill="none" stroke="'+grey+'" stroke-width="'+roadW+'"/>';
    const arcEnd=normOut, sRad=(180-90)*Math.PI/180, eRad=(arcEnd-90)*Math.PI/180;
    const sx=+(cx+rr*Math.cos(sRad)).toFixed(2), sy2=+(cy+rr*Math.sin(sRad)).toFixed(2);
    const ex2=+(cx+rr*Math.cos(eRad)).toFixed(2), ey2=+(cy+rr*Math.sin(eRad)).toFixed(2);
    const la=((arcEnd-180+360)%360)>180?1:0;
    s+='<path d="M'+sx+','+sy2+' A'+rr+','+rr+' 0 '+la+' 0 '+ex2+','+ey2+'" fill="none" stroke="'+red+'" stroke-width="'+routeW+'" stroke-linecap="round"/>';
    s+='<line x1="'+rx2+'" y1="'+ry2+'" x2="'+oxs+'" y2="'+oys+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>';
    s+='<line x1="'+rx2+'" y1="'+ry2+'" x2="'+oxs+'" y2="'+oys+'" stroke="'+red+'" stroke-width="'+routeW+'" stroke-linecap="round"/>';
  } else {
    arms.forEach(a => {
      if (Math.abs(a-180)<1||Math.abs(a-normOut)<1) return;
      const [ax,ay]=toXY(a,roadLen);
      s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ax+'" y2="'+ay+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>';
    });
    s+='<line x1="'+ex0+'" y1="'+ey0+'" x2="'+cx+'" y2="'+cy+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>';
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+oxs+'" y2="'+oys+'" stroke="'+grey+'" stroke-width="'+roadW+'" stroke-linecap="round"/>';
    s+='<line x1="'+ex0+'" y1="'+ey0+'" x2="'+cx+'" y2="'+cy+'" stroke="'+red+'" stroke-width="'+routeW+'" stroke-linecap="round"/>';
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+oxs+'" y2="'+oys+'" stroke="'+red+'" stroke-width="'+routeW+'" stroke-linecap="round"/>';
  }
  s+='<polygon points="'+arrowPoly(normOut,+ox1,+oy1)+'" fill="'+red+'"/>';

  s+='<circle cx="'+ex0+'" cy="'+ey0+'" r="5" fill="'+ink+'" stroke="white" stroke-width="2"/>';
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+S+'" height="'+S+'" viewBox="0 0 '+S+' '+S+'">'+s+'</svg>';
}

// ─── Format distance

// ─── Format distance ──────────────────────────────────────────────────────────
function fmtDist(m) { return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(1)+' km'; }

// ─── Interpolation

// ─── Interpolation ────────────────────────────────────────────────────────────
function interpolateLinear(points, stepM) {
  const out=[points[0]];
  for (let i=1; i<points.length; i++) {
    const a=points[i-1], b=points[i], d=haversine(a,b);
    if (d<0.001) continue;
    const steps=Math.floor(d/stepM);
    for (let j=1; j<=steps; j++) { const t=j/(steps+1); out.push({lat:a.lat+t*(b.lat-a.lat), lon:a.lon+t*(b.lon-a.lon), ele:a.ele+t*(b.ele-a.ele)}); }
    out.push(b);
  }
  return out;
}
function catmullRomPoint(p0,p1,p2,p3,t) {
  const t2=t*t, t3=t2*t;
  return {
    lat:0.5*((2*p1.lat)+(-p0.lat+p2.lat)*t+(2*p0.lat-5*p1.lat+4*p2.lat-p3.lat)*t2+(-p0.lat+3*p1.lat-3*p2.lat+p3.lat)*t3),
    lon:0.5*((2*p1.lon)+(-p0.lon+p2.lon)*t+(2*p0.lon-5*p1.lon+4*p2.lon-p3.lon)*t2+(-p0.lon+3*p1.lon-3*p2.lon+p3.lon)*t3),
    ele:0.5*((2*p1.ele)+(-p0.ele+p2.ele)*t+(2*p0.ele-5*p1.ele+4*p2.ele-p3.ele)*t2+(-p0.ele+3*p1.ele-3*p2.ele+p3.ele)*t3),
  };
}
function interpolateSpline(points, stepM) {
  if (points.length<2) return points;
  const out=[], n=points.length;
  for (let i=0; i<n-1; i++) {
    const p0=points[Math.max(0,i-1)], p1=points[i], p2=points[i+1], p3=points[Math.min(n-1,i+2)];
    const segDist=haversine(p1,p2);
    if (segDist<0.001) continue;
    const steps=Math.max(1,Math.round(segDist/stepM));
    for (let j=0; j<steps; j++) out.push(catmullRomPoint(p0,p1,p2,p3,j/steps));
  }
  out.push(points[n-1]);
  return out;
}
function applyInterpolation(rawPoints, method, stepM) {
  if (method==='linear') return interpolateLinear(rawPoints,stepM);
  if (method==='spline') return interpolateSpline(rawPoints,stepM);
  return rawPoints;
}

// Toggle a row's picker open/closed
document.addEventListener('click', function(e) {
  // ⊕ trigger clicked
  if (e.target.classList.contains('spk-trigger')) {
    const panel = e.target.nextElementSibling;
    // Close all other open panels first
    document.querySelectorAll('.spk-panel.open').forEach(function(p) {
      if (p !== panel) p.classList.remove('open');
    });
    panel.classList.toggle('open');
    return;
  }
  // Signal button clicked
  if (e.target.closest('.spk-btn')) {
    const btn   = e.target.closest('.spk-btn');
    const panel = btn.closest('.spk-panel');
    const sig   = SIGNALS[parseInt(btn.dataset.i)];
    const row   = btn.closest('tr');
    const strip = row.querySelector('.sym-strip');
    // Add image to strip in tulip cell
    const img = document.createElement('img');
    img.src   = sig.uri;
    img.title = sig.label + ' — click to remove';
    img.addEventListener('click', function() { img.remove(); });
    strip.appendChild(img);
    // Close the panel
    panel.classList.remove('open');
    return;
  }
  // Click outside any panel — close all
  if (!e.target.closest('.spk-panel') && !e.target.classList.contains('spk-trigger')) {
    document.querySelectorAll('.spk-panel.open').forEach(function(p) { p.classList.remove('open'); });
  }
});

// ─── Surface Detection via Overpass API ──────────────────────────────────────
function surfaceCategory(tag) {
  if (!tag) return null;
  const t = tag.toLowerCase();
  // Paved — black
  if (['asphalt','paved','concrete','paving_stones','sett','cobblestone','cobblestone:flattened',
       'unhewn_cobblestone','metal','wood','tartan','acrylic','rubber','tiles',
       'stepping_stones'].some(s => t.includes(s))) return 'paved';
  // Gravel — grey
  if (['gravel','compacted','fine_gravel','rock','pebblestone','unpaved',
       'woodchips','artificial_turf','grass_paver'].some(s => t.includes(s))) return 'gravel';
  // Dirt/mud — brown
  if (['dirt','ground','clay','mud'].some(s => t.includes(s))) return 'dirt';
  // Sand — yellow
  if (['sand','desert'].some(s => t.includes(s))) return 'sand';
  // Grass — green
  if (['grass'].some(s => t.includes(s))) return 'grass';
  // Ice/snow/salt — white
  if (['ice','snow','salt'].some(s => t.includes(s))) return 'ice';
  return null;
}

function hexPath() {
  const pts = [];
  for (let i=0;i<6;i++){const a=(i*60-30)*Math.PI/180;pts.push((14+11*Math.cos(a)).toFixed(1)+','+(14+11*Math.sin(a)).toFixed(1));}
  return pts.join(' ');
}

function hexPoly(cx, cy, r) {
  const pts = [];
  for (let i=0;i<6;i++){const a=(i*60-30)*Math.PI/180;pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}
  return pts.join(' ');
}

function drawSurfaceSymbol(cat, difficult) {
  const colors = {
    paved:  '#1a1a18',
    gravel: '#8a8a88',
    dirt:   '#8B5E3C',
    sand:   '#D4A843',
    grass:  '#3a8a3a',
    ice:    '#ddeeff',
    rock:   '#6a6a6a',
  };
  const color = colors[cat];
  if (!color) return '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="4" fill="none" stroke="#ccc5b0" stroke-width="1.5"/></svg>';

  // Single hexagon types: paved, ice
  const single = ['paved','ice'];
  // Triple hexagon types: gravel, dirt, sand, grass, rock
  const triple = ['gravel','dirt','sand','grass','rock'];

  const stroke = cat === 'ice' ? ' stroke="#aaccee" stroke-width="1.5"' : '';

  // Difficult outer ring points (only used for single hex)
  const outerPts = hexPoly(14, 14, 13);

  let svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">';

  if (single.includes(cat)) {
    // One hexagon centred, with optional difficult ring
    if (difficult) svg += '<polygon points="'+outerPts+'" fill="none" stroke="#c8352a" stroke-width="2"/>';
    svg += '<polygon points="'+hexPoly(14,14,10)+'" fill="'+color+'"'+stroke+'/>';
  } else if (triple.includes(cat)) {
    // Three small hexagons in triangle: one top-centre, two bottom
    const r = 6;
    const positions = [[14,6],[8,18],[20,18]];
    if (difficult) {
      // Difficult ring: outline around all three as a larger triangle shape
      svg += '<polygon points="'+hexPoly(14,6,9)+'" fill="none" stroke="#c8352a" stroke-width="1.5"/>';
      svg += '<polygon points="'+hexPoly(8,18,9)+'" fill="none" stroke="#c8352a" stroke-width="1.5"/>';
      svg += '<polygon points="'+hexPoly(20,18,9)+'" fill="none" stroke="#c8352a" stroke-width="1.5"/>';
    }
    positions.forEach(function(p){
      svg += '<polygon points="'+hexPoly(p[0],p[1],r)+'" fill="'+color+'"/>';
    });
  }

  svg += '</svg>';
  return svg;
}
function drawElevationArrow(direction) {
  // direction: 'up' = bottom-left to top-right, 'down' = top-left to bottom-right
  if (!direction) return '';
  const col = direction === 'up' ? '#c8352a' : '#2a6bbf';
  // Arrow line + arrowhead
  if (direction === 'up') {
    // bottom-left to top-right
    return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="28" viewBox="0 0 14 28">' +
      '<line x1="3" y1="24" x2="11" y2="4" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round"/>' +
      '<polygon points="11,4 5,8 10,10" fill="'+col+'"/>' +
      '</svg>';
  } else {
    // top-left to bottom-right
    return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="28" viewBox="0 0 14 28">' +
      '<line x1="3" y1="4" x2="11" y2="24" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round"/>' +
      '<polygon points="11,24 4,18 9,20" fill="'+col+'"/>' +
      '</svg>';
  }
}

function drawElevationArrow(direction) {
  if (!direction) return '';
  const col = '#c8352a'; // red for both up and down
  if (direction === 'up') {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="28" viewBox="0 0 14 28">' +
      '<line x1="3" y1="24" x2="11" y2="4" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round"/>' +
      '<polygon points="11,4 5,8 10,10" fill="'+col+'"/>' +
      '</svg>';
  } else {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="28" viewBox="0 0 14 28">' +
      '<line x1="3" y1="4" x2="11" y2="24" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round"/>' +
      '<polygon points="11,24 4,18 9,20" fill="'+col+'"/>' +
      '</svg>';
  }
}

function fetchElevation() {
  if (!detectedTurns.length) { alert('Generate a roadbook first.'); return; }
  const btn = document.getElementById('elevationBtn');
  const rows = document.querySelectorAll('#rbBody tr');
  btn.textContent = 'Calculating…'; btn.disabled = true;
  detectedTurns.forEach((t, i) => {
    const strip = rows[i] ? rows[i].querySelector('.surf-strip') : null;
    if (!strip) return;
    // Get current content (surface symbol) and append/update arrow
    const existingSvgs = strip.querySelectorAll('svg');
    // Remove any existing arrow (last svg if it has a line element)
    if (existingSvgs.length > 1) existingSvgs[existingSvgs.length-1].remove();
    else if (existingSvgs.length === 1 && existingSvgs[0].querySelector('line')) existingSvgs[0].remove();
    // Add elevation arrow
    const arrowHtml = drawElevationArrow(t.elevDir);
    if (arrowHtml) {
      const tmp = document.createElement('div');
      tmp.innerHTML = arrowHtml;
      strip.appendChild(tmp.firstChild);
    }
  });
  btn.textContent = 'Elevation fetched ✓';
  setTimeout(function(){ btn.textContent = 'Fetch elevation'; btn.disabled = false; }, 2000);
}

let detectedTurns = [];
async function fetchSurfaces() {
  const rows = document.querySelectorAll('#rbBody tr');
  if (!rows.length || !detectedTurns.length) { alert('Generate a roadbook first.'); return; }
  const btn = document.getElementById('surfaceBtn');
  btn.textContent = 'Fetching…'; btn.disabled = true;
  const unions = detectedTurns.map(t => 'way(around:30,'+t.pt.lat.toFixed(6)+','+t.pt.lon.toFixed(6)+')[highway];').join('\n');
  const query = '[out:json][timeout:25];(\n'+unions+'\n);out tags center;';
  try {
    const resp = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data='+encodeURIComponent(query)
    });
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    detectedTurns.forEach((t,i) => {
      let bestSurface=null, bestDist=Infinity;
      (data.elements||[]).forEach(el => {
        if (!el.center) return;
        const d = Math.hypot(el.center.lat-t.pt.lat, el.center.lon-t.pt.lon);
        if (d<bestDist){bestDist=d; bestSurface=el.tags&&el.tags.surface?el.tags.surface:null;}
      });
      const strip = rows[i]?rows[i].querySelector('.surf-strip'):null;
      if (strip) strip.innerHTML = drawSurfaceSymbol(surfaceCategory(bestSurface), t.difficult);
    });
    btn.textContent='Surfaces fetched ✓';
    setTimeout(()=>{btn.textContent='Fetch surfaces';btn.disabled=false;},2000);
  } catch(err) {
    btn.textContent='Fetch surfaces'; btn.disabled=false;
    alert('Surface fetch failed: '+err.message);
  }
}

function loadFile(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    const pts=parseGPX(e.target.result);
    if(pts.length<2){fileInfo.innerHTML='<span style="color:var(--accent)">No track points found.</span>';fileInfo.classList.add('visible');return;}
    gpxPoints=pts; gpxName=file.name.replace('.gpx','');
    let totalM=0; for(let i=1;i<pts.length;i++) totalM+=haversine(pts[i-1],pts[i]);
    fileInfo.innerHTML='Loaded <strong>'+file.name+'</strong> — <strong>'+pts.length.toLocaleString()+'</strong> track points · <strong>'+fmtDist(totalM)+'</strong> total';
    fileInfo.classList.add('visible'); controls.classList.add('visible');
  };
  reader.readAsText(file);
}

function generate() {
  if(!gpxPoints.length) return;
  const method=interpMethod.value, stepM=parseInt(spacingSlider.value);
  const minAngle=parseInt(angleSlider.value), minDist=parseInt(distSlider.value);
  const working=applyInterpolation(gpxPoints,method,stepM);
  interpBadge.textContent=method!=='none'?gpxPoints.length.toLocaleString()+' → '+working.length.toLocaleString()+' pts':'';
  const {turns,totalDist}=detectTurns(working,minAngle,minDist);
  const mLabel={none:'raw GPX',linear:'linear',spline:'spline'}[method];
  rbStats.innerHTML='<span><strong>'+turns.length+'</strong> turns detected</span><span>Total: <strong>'+fmtDist(totalDist)+'</strong></span><span style="font-style:italic">'+mLabel+(method!=='none'?' · '+stepM+' m':'')+'</span>';
  rbBody.innerHTML='';
  if(turns.length===0){
    rbBody.innerHTML='<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--muted);font-style:italic;">No turns detected — try lowering the minimum angle.</td></tr>';
  } else {
    turns.forEach(t=>{
      const cls=classifyTurn(t.angle);
      const tulip=drawTulip(t.bearingIn,t.bearingOut,t.angle,t.junctionHint||'normal');
      const totalKm=(t.distFromStart/1000).toFixed(2);
      const deltaM=Math.round(t.distFromLast);
      const deltaStr=deltaM>=1000?(deltaM/1000).toFixed(1)+' km':deltaM+' m';
      const row=document.createElement('tr');
      row.innerHTML=
        '<td class="col-dist">'+
          '<div class="dist-total-wrap">'+
            '<span class="dist-total">'+totalKm+'</span>'+
            '<span class="dist-total-unit">km</span>'+
          '</div>'+
          '<div class="dist-delta-box">'+
            '<span class="dist-delta">+'+deltaStr+'</span>'+
          '</div>'+
        '</td>'+
        '<td class="col-tulip">'+
          '<div class="sym-strip"></div>'+
          tulip+
          '<div class="surf-strip"></div>'+
        '</td>'+
        '<td class="col-notes">'+
          '<span class="turn-name">'+cls.label+'</span>'+
          '<span class="turn-deg">'+(t.angle>0?'+':'')+Math.round(t.angle)+'°</span>'+
          '<input class="notes-input" type="text" placeholder="Add note or caution…">'+
          PICKER_HTML+
        '</td>';
      rbBody.appendChild(row);
    });
  }
  roadbookSection.classList.add('visible');
  roadbookSection.scrollIntoView({behavior:'smooth',block:'start'});
  // Store turn points + difficulty + elevation direction for surface lookup
  detectedTurns = turns.map((t, i) => {
    const pt = working[t.index] || working[working.length-1];

    // Look back over approach to measure elevation change
    const LOOK = 20;
    const startIdx = Math.max(0, t.index - LOOK);
    const endIdx   = t.index;
    const eleStart = (working[startIdx]&&working[startIdx].ele)||0;
    const eleEnd   = (working[endIdx]&&working[endIdx].ele)||0;
    const eleDiff  = eleEnd - eleStart; // signed: positive = uphill, negative = downhill
    const distApproach = Math.max(1, t.distFromLast);
    const grade = Math.abs(eleDiff) / distApproach * 100;

    const sharpAngle = Math.abs(t.angle) >= 70;
    const steepGrade = grade >= 8;
    const shortSteep = grade >= 6 && distApproach < 200;
    const difficult  = (steepGrade && sharpAngle) || grade >= 15 || shortSteep;

    // Elevation arrow: only show when grade is steep enough (>=6%)
    let elevDir = null;
    if (grade >= 6) elevDir = eleDiff > 0 ? 'up' : 'down';

    return { pt, difficult, elevDir };
  });
  document.getElementById('surfaceBtn').style.display = 'inline-block';
  document.getElementById('elevationBtn').style.display = 'inline-block';
}
